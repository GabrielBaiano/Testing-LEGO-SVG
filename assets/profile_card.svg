<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean Background -->
  <rect width="600" height="400" fill="white" />
  
  <!-- Stylized Tree Icon (SVG Paths) -->
  <g transform="translate(40, 40) scale(0.8)">
    <path d="M50 100 Q55 110 50 120 Q45 110 50 100" fill="#4B3621" /> <!-- Trunk -->
    <circle cx="50" cy="50" r="30" fill="#2ECC40" />
    <circle cx="30" cy="70" r="25" fill="#228B22" />
    <circle cx="70" cy="70" r="25" fill="#228B22" />
    <circle cx="50" cy="80" r="20" fill="#006400" />
  </g>

  <!-- Name and Location -->
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A1A1A">Emmanuel Hong</text>
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="16" fill="#888888">New York City</text>

  <!-- Bio Paragraph 1 -->
  <text x="40" y="230" font-family="Arial, sans-serif" font-size="16" fill="#333333">
    <tspan x="40" dy="0">As a child, I was fascinated by my father's drawings. Little did I</tspan>
    <tspan x="40" dy="24">know at the time but that fascination combined with my natural</tspan>
    <tspan x="40" dy="24">wonder for the world would be the start of my journey in design.</tspan>
  </text>

  <!-- Bio Paragraph 2 -->
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="16" fill="#333333">
    <tspan x="40" dy="0">Currently designing at Bevel and capturing moments with my Ricoh</tspan>
    <tspan x="40" dy="24">GRIII + iPhone.</tspan>
  </text>
</svg>
