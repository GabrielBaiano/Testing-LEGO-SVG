<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="black" />
  
  <rect width="100" height="100" fill="none" stroke="#222" stroke-width="1" />

  <!-- Define the Star Shape once -->
  <defs>
    <path id="star" d="M0 -30 Q5 0 30 0 Q5 0 0 30 Q-5 0 -30 0 Q-5 0 0 -30 Z" fill="white" />
  </defs>

  <!-- Top Star -->
  <use x="50" y="0" xlink:href="#star" transform="rotate(15, 50, 0)">
    <animate attributeName="y" values="0;5;-5;0" dur="3s" repeatCount="indefinite" />
  </use>

  <!-- Right Star -->
  <use x="100" y="50" xlink:href="#star" transform="rotate(15, 100, 50)">
    <animate attributeName="x" values="100;105;95;100" dur="3s" repeatCount="indefinite" />
  </use>

  <!-- Bottom Star -->
  <use x="50" y="100" xlink:href="#star" transform="rotate(15, 50, 100)">
    <animate attributeName="y" values="100;95;105;100" dur="3s" repeatCount="indefinite" />
  </use>

  <!-- Left Star -->
  <use x="0" y="50" xlink:href="#star" transform="rotate(15, 0, 50)">
    <animate attributeName="x" values="0;-5;5;0" dur="3s" repeatCount="indefinite" />
  </use>
</svg>
