<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="black" />
  
  <!-- Top Star -->
  <g transform="translate(50, 0) rotate(15)">
    <path d="M0 -30 Q5 0 30 0 Q5 0 0 30 Q-5 0 -30 0 Q-5 0 0 -30 Z" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,-2; 0,3; 0,-2" dur="4s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>

  <!-- Right Star -->
  <g transform="translate(100, 50) rotate(15)">
    <path d="M0 -30 Q5 0 30 0 Q5 0 0 30 Q-5 0 -30 0 Q-5 0 0 -30 Z" fill="white">
      <animateTransform attributeName="transform" type="translate" values="-2,0; 3,0; -2,0" dur="4s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>

  <!-- Bottom Star -->
  <g transform="translate(50, 100) rotate(15)">
    <path d="M0 -30 Q5 0 30 0 Q5 0 0 30 Q-5 0 -30 0 Q-5 0 0 -30 Z" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,-2; 0,3; 0,-2" dur="4s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>

  <!-- Left Star -->
  <g transform="translate(0, 50) rotate(15)">
    <path d="M0 -30 Q5 0 30 0 Q5 0 0 30 Q-5 0 -30 0 Q-5 0 0 -30 Z" fill="white">
      <animateTransform attributeName="transform" type="translate" values="-2,0; 3,0; -2,0" dur="4s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>
</svg>
