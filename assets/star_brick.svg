<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" fill="#FFDC00" />
  
  <defs>
    <g id="star-pattern">
      <!-- Central Star -->
      <path d="M50 20 Q55 45 80 50 Q55 55 50 80 Q45 55 20 50 Q45 45 50 20 Z" fill="white" />
      
      <!-- Edges -->
      <path d="M50 -30 Q55 -5 80 0 Q55 5 50 30 Q45 5 20 0 Q45 -5 50 -30 Z" fill="white" />
      <path d="M50 70 Q55 95 80 100 Q55 105 50 130 Q45 105 20 100 Q45 95 50 70 Z" fill="white" />
      <path d="M-30 50 Q-5 55 0 80 Q5 55 30 50 Q5 45 0 20 Q-5 45 -30 50 Z" fill="white" />
      <path d="M70 50 Q95 55 100 80 Q105 55 130 50 Q105 45 100 20 Q95 45 70 50 Z" fill="white" />
      
      <!-- Corners -->
      <circle cx="0" cy="0" r="10" fill="white" opacity="0.5" />
      <circle cx="100" cy="0" r="10" fill="white" opacity="0.5" />
      <circle cx="0" cy="100" r="10" fill="white" opacity="0.5" />
      <circle cx="100" cy="100" r="10" fill="white" opacity="0.5" />
    </g>
  </defs>

  <!-- Animated Use Tags (Attribute Animation) -->
  <use xlink:href="#star-pattern" x="0">
    <animate attributeName="x" from="0" to="100" dur="3s" repeatCount="indefinite" />
  </use>
  <use xlink:href="#star-pattern" x="-100">
    <animate attributeName="x" from="-100" to="0" dur="3s" repeatCount="indefinite" />
  </use>
</svg>
