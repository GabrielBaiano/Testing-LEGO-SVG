<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean Background -->
  <rect width="600" height="300" fill="white" />
  
  <!-- Name and Location (Shifted up since icon is gone) -->
  <text x="40" y="60" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A1A1A">Gabriel Gama</text>
  <text x="40" y="85" font-family="Arial, sans-serif" font-size="16" fill="#888888">Brazil</text>

  <!-- Bio Paragraph 1 -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="16" fill="#333333">
    <tspan x="40" dy="0">Developer and creative experiment enthusiast. Always seeking</tspan>
    <tspan x="40" dy="24">ways to challenge the limitations of development tools, like</tspan>
    <tspan x="40" dy="24">turning a README into a LEGO set.</tspan>
  </text>

  <!-- Bio Paragraph 2 -->
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="16" fill="#333333">
    <tspan x="40" dy="0">Currently exploring the potential of modular SVG components</tspan>
    <tspan x="40" dy="24">and interactive architectures directly on GitHub.</tspan>
  </text>
</svg>
