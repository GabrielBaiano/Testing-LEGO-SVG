<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Star Brick Definition -->
    <path id="tiny-star" d="M0 -10 L2 -3 L10 -2 L4 2 L6 10 L0 5 L-6 10 L-4 2 L-10 -2 L-2 -3 Z" fill="#2ECC40" stroke="#2ECC40" stroke-width="2" stroke-linejoin="round" />
    <g id="star-brick">
      <rect width="100" height="100" fill="white" />
      <g id="pattern">
        <use href="#tiny-star" transform="translate(50, 0) rotate(15)" />
        <use href="#tiny-star" transform="translate(100, 50) rotate(15)" />
        <use href="#tiny-star" transform="translate(50, 100) rotate(15)" />
        <use href="#tiny-star" transform="translate(0, 50) rotate(15)" />
      </g>
      <use href="#pattern">
        <animate attributeName="x" values="0; 100" dur="12s" repeatCount="indefinite" calcMode="linear" />
      </use>
      <use href="#pattern" x="-100">
        <animate attributeName="x" values="-100; 0" dur="12s" repeatCount="indefinite" calcMode="linear" />
      </use>
    </g>

    <!-- Retro Card Content -->
    <g id="retro-content">
      <rect width="400" height="300" fill="black" stroke="#00A3FF" stroke-width="6" />
      <rect width="400" height="30" fill="#00A3FF" />
      <text x="10" y="21" font-family="monospace" font-size="14" font-weight="bold" fill="white">CREATIVE-WATCH-WARE</text>
      <g transform="translate(30, 60) scale(4)">
        <rect x="5" y="5" width="20" height="25" fill="#E1E1E1" />
        <rect x="10" y="0" width="10" height="5" fill="#E1E1E1" />
        <rect x="5" y="4" width="20" height="2" fill="#E1E1E1" />
        <rect x="8" y="8" width="4" height="2" fill="black" />
        <rect x="18" y="8" width="4" height="2" fill="black" />
      </g>
      <text x="150" y="90" font-family="monospace" font-size="28" font-weight="bold" fill="white">CREATIVE</text>
      <text x="150" y="120" font-family="monospace" font-size="28" font-weight="bold" fill="white">WATCH</text>
      <text x="150" y="160" font-family="monospace" font-size="12" fill="#AAA">THE BUTTONS IN THIS SVG</text>
      <text x="150" y="175" font-family="monospace" font-size="12" fill="#AAA">ARE CLICKABLE</text>
      <rect x="150" y="210" width="220" height="50" fill="none" stroke="white" stroke-width="3" />
      <text x="260" y="242" font-family="monospace" font-size="22" font-weight="bold" fill="white" text-anchor="middle">PORTFOLIO</text>
    </g>
  </defs>

  <!-- Row 2-4: Star | Card | Star -->
  <!-- Left Side (3 vertical stars) -->
  <g transform="translate(0, 0)"><use href="#star-brick" y="0" /><use href="#star-brick" y="100" /><use href="#star-brick" y="200" /></g>
  
  <!-- Center Card -->
  <use href="#retro-content" x="100" />

  <!-- Right Side (3 vertical stars) -->
  <g transform="translate(500, 0)"><use href="#star-brick" y="0" /><use href="#star-brick" y="100" /><use href="#star-brick" y="200" /></g>
</svg>
